<!DOCTYPE html>
<html lang="">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos | InovaHealth</title>
    <link rel="stylesheet" href="./styles/contactos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <header>
        <div class="header-top">
            <i class="fa fa-facebook"></i>
            <i class="fa fa-instagram"></i>
            <i class="fa fa-linkedin"></i>
            <i class="fa fa-youtube"></i>
            <i class="fa fa-twitter"></i>
        </div>
        <div class="header-bottom" id="header">
            <div><img src="./assets/images/inovaHealthBGLess.png" alt=""></div>
            <i class="fa fa-bars"></i>
            <nav>
                <a href="#">Corporativo </a>
                <a href="#">Utente </a>
                <a href="#">Profissional </a>
                <a href="index.html">casa</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="section section-contactos">
            <div class="section-contactos-set">
                <div class="contactos-linhas">
                    <div class="contactos-linha">
                        <span class="contacto-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="lucide lucide-mail-icon lucide-mail">
                                <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7" />
                                <rect x="2" y="4" width="20" height="16" rx="2" />
                            </svg>
                        </span>
                        <span class="contacto-iten"> <b>Email:</b> geral@inovahealth.com</span>
                    </div>
                    <div class="contactos-linha">
                        <span class="contacto-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="lucide lucide-map-pin-icon lucide-map-pin">
                                <path
                                    d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0" />
                                <circle cx="12" cy="10" r="3" />
                            </svg>
                        </span>
                        <span class="contacto-iten"> <b>Postal:</b> SERV.0224488.UE</span>
                    </div>
                    <div class="contactos-linha">
                        <span class="contacto-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="lucide lucide-phone-call-icon lucide-phone-call">
                                <path d="M13 2a9 9 0 0 1 9 9" />
                                <path d="M13 6a5 5 0 0 1 5 5" />
                                <path
                                    d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384" />
                            </svg>
                        </span>
                        <span class="contacto-iten"> <b>Tel:</b> +244 948 925 482</span>
                    </div>
                    <div class="contactos-cta" >
                        <span class="cta-titulo">Não exites!</span>
                        <span class="cta-texto" >Estamos expectantes pelo teu contacto.</span>
                    </div>
                </div>
                <div class="contactos-formulario">
                    <form action="" method="post">
                        <div class="form-section">
                            <label for="nome">Nome:</label>
                            <input type="text" name="nome" id="" placeholder="Escreva teu nome aqui">
                        </div>

                        <div class="form-section">
                            <label for="numero">Número:</label>
                            <input type="number" name="numero" placeholder="Escreva teu telefone aqui">
                        </div>

                        <div class="form-section">
                            <label for="email">E-mail:</label>
                            <input type="email" name="email" id="" placeholder="Escreva teu email aqui">
                        </div>

                        <div class="form-section">
                            <label for="email">A tua mensagem:</label>
                            <textarea name="" id="" placeholder="Escreva a tua mensagem aqui"></textarea>
                        </div>
                        <div class="form-checkbox-set">
                            <input type="checkbox" name="" id="">
                            <small>Concorda que leu as <a href="#">politicas de provacidade!</a> </small>
                        </div>
                    </form>
                </div>
            </div>
        </section>
        <section class="section section-mapa">
            <div class="div-mapa-introduction" >
                <h1>Estamos do outro lado da tela!</h1>
                <p>Rastreie a nossa localizadação...</p>
            </div>
            <div class="div-mapa" >
                <iframe class="mapa" id="mapa"
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d126153.01125326552!2d13.201702434304288!3d-8.853353713270517!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1a51f15cdc8d2c7d%3A0x850c1c5c5ecc5a92!2sLuanda!5e0!3m2!1spt-PT!2sao!4v1762105190339!5m2!1spt-PT!2sao"
                    allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </section>
        <footer style="margin-top: 100px;">

        </footer>


    </main>
